kind = "web"
previewPath = "/"
title = "Medical Imaging Research Portal"
version = "1.0.0"
id = "artifacts/medical-portal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18914

[services.development]
run = "pnpm --filter @workspace/medical-portal run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/medical-portal", "run", "build" ]
publicDir = "artifacts/medical-portal/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18914"
BASE_PATH = "/"
