services:
  db:
    image: postgres:16
    container_name: medical_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: medical_portal
      POSTGRES_USER: medical_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medical_user -d medical_portal"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - medical_db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  app:
    build:
      context: ..
      dockerfile: ../Dockerfile
    container_name: medical_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://medical_user:${DB_PASSWORD}@db:5432/medical_portal
      OBJECT_STORAGE_DRIVER: local
      LOCAL_OBJECT_STORAGE_DIR: /app/data/object-storage
      PYTHON_BIN: python3
      LOG_LEVEL: info
      SESSION_SECRET: ${SESSION_SECRET}
    ports:
      - "${WEB_PORT:-80}:3000"
    volumes:
      - medical_uploads:/app/data/object-storage

volumes:
  medical_db_data:
  medical_uploads:
